name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔥 Use stable Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 🔥 CLEAN INSTALL (IMPORTANT)
      - name: Install dependencies
        run: |
          cd frontend
          rm -rf node_modules package-lock.json
          npm install

      # 🔥 BUILD
      - name: Build frontend
        run: |
          cd frontend
          npx vite build

      # 🔥 DEPLOY (skip Azure build)
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_COAST_0E62B3600 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: "dist"
          skip_app_build: true